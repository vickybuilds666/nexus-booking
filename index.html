<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Space Travel</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
  text-align:center;
}

header{
  padding:40px;
  background:#050505;
}

h1{
  font-size:40px;
}

.destinations{
  padding:50px;
}

.cards{
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
}

.card{
  background:#111;
  padding:25px;
  border-radius:15px;
  width:260px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#00bfff;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#008ecc;
}
</style>
</head>

<body>

<header>
<h1>🚀 Future Space Travel</h1>
<p>Book your journey beyond Earth</p>
</header>

<section class="destinations">

<div class="cards">

<div class="card">
<h2>🌙 Moon Trip</h2>
<p>Experience low gravity and breathtaking Earth views.</p>
<button>Book Moon Mission</button>
</div>

<div class="card">
<h2>🔴 Mars Adventure</h2>
<p>Travel to the red planet and explore futuristic colonies.</p>
<button>Book Mars Mission</button>
</div>

</div>

</section>

</body>
</html>
